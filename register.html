<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Đăng ký</title>
</head>
<body>

<h2>Form đăng ký</h2>

<form action="#" method="POST">

<fieldset>
<legend>Thông tin cá nhân</legend>

<label for="name">Họ tên:</label>
<input type="text" id="name" name="name" required minlength="2" maxlength="50" placeholder="Nhập họ tên"><br><br>

<label for="email">Email:</label>
<input type="email" id="email" name="email" required placeholder="example@email.com"><br><br>

<label for="phone">SĐT:</label>
<input type="tel" id="phone" name="phone" pattern="[0-9]{10}" placeholder="0901234567"><br><br>

<label for="dob">Ngày sinh:</label>
<input type="date" id="dob" name="dob" max="2026-01-01"><br><br>

</fieldset>

<fieldset>
<legend>Tài khoản</legend>

<label for="user">Username:</label>
<input type="text" id="user" name="user" pattern="[A-Za-z0-9_]{3,20}" placeholder="username"><br><br>

<label for="pass">Password:</label>
<input type="password" id="pass" name="pass" minlength="8"
pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}" placeholder="Mật khẩu"><br><br>

<label for="confirm">Xác nhận mật khẩu:</label>
<input type="password" id="confirm" name="confirm" minlength="8" placeholder="Nhập lại"><br><br>

</fieldset>

<fieldset>
<legend>Thông tin giao hàng</legend>

<label for="city">Thành phố:</label>
<select id="city" name="city">
<option>Hà Nội</option>
<option>Hải Dương</option>
<option>TP.HCM</option>
<option>Đà Nẵng</option>
<option>Cần Thơ</option>
</select><br><br>

<label for="district">Quận/Huyện:</label>
<select id="district" name="district">
<option>Quận 1</option>
<option>Quận 2</option>
</select><br><br>

<label for="address">Địa chỉ:</label>
<textarea id="address" name="address" rows="3" placeholder="Nhập địa chỉ"></textarea><br><br>

<label>Giới tính:</label>
<input type="radio" name="gender" value="male"> Nam
<input type="radio" name="gender" value="female"> Nữ
<input type="radio" name="gender" value="other"> Khác

</fieldset>

<br>
<label>
<input type="checkbox" required> Đồng ý điều khoản
</label>

<br><br>
<button type="submit">Đăng ký</button>
<button type="reset">Reset</button>

</form>

</body>
</html>
