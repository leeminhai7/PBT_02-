<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Checkout</title>
</head>
<body>

<h2>Giỏ hàng</h2>

<table border="1">
<thead>
<tr>
<th>STT</th>
<th>Sản phẩm</th>
<th>Giá</th>
<th>Số lượng</th>
<th>Thành tiền</th>
</tr>
</thead>

<tbody>
<tr><td>1</td><td>iPhone</td><td>20tr</td><td>1</td><td>20tr</td></tr>
<tr><td>2</td><td>Samsung</td><td>15tr</td><td>1</td><td>15tr</td></tr>
<tr><td>3</td><td>Xiaomi</td><td>10tr</td><td>1</td><td>10tr</td></tr>
</tbody>

<tfoot>
<tr>
<td colspan="4">Tổng</td>
<td>45tr</td>
</tr>
</tfoot>
</table>

<h3>Thanh toán</h3>

<form>

<label>Phương thức:</label>
<input type="radio" name="pay"> COD
<input type="radio" name="pay"> Bank
<input type="radio" name="pay"> Ví<br><br>

<label>Mã giảm giá:</label>
<input type="text" pattern="SALE[0-9]{4}" placeholder="SALE2026"><br><br>

<label>Ghi chú:</label>
<textarea></textarea><br><br>

<h3>Giao hàng</h3>

<label>Ngày:</label>
<input type="date" min="2026-04-30"><br><br>

<label>Giờ:</label>
<select>
<option>Sáng</option>
<option>Chiều</option>
<option>Tối</option>
</select><br><br>

<label>Thời gian:</label>
<input type="range" min="1" max="7"><br><br>

<button type="submit" aria-label="Xác nhận đặt hàng">Đặt hàng</button>

</form>

</body>
</html>
